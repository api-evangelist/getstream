description: >-
  FinOps view of Stream spend. Stream is a usage-metered communications platform:
  Chat and Activity Feeds are billed primarily on Monthly Active Users (MAU),
  Video and Audio on participant minutes, and AI Moderation on moderated
  volume/credits. Because MAU counts any unique user who connects in a month,
  the dominant cost driver is active-user growth rather than raw API call
  volume; the second driver is Video participant minutes, which scale with call
  length, participant count, and resolution. A free (and larger Maker) allowance
  covers early usage before Standard usage-based billing and Enterprise contracts
  apply.
notes: >-
  Per-unit rates are not reconciled here; verify on the per-product pricing
  pages. Watch WebSocket connection hygiene (one connectUser per user session) -
  duplicate connections can inflate MAU-adjacent behavior and cost.
