meters:
- name: chat_mau
  description: Monthly active users connecting to Stream Chat, the primary Chat billing dimension.
  unit: users
  aggregation: unique_count
  dimensions:
  - application
  - environment
- name: feeds_mau_or_calls
  description: Activity Feeds usage, metered on monthly active users and/or API call volume.
  unit: users
  aggregation: unique_count
  dimensions:
  - application
- name: video_participant_minutes
  description: Audio/Video participant minutes, billed per 1,000 and varying by resolution and features.
  unit: minutes
  aggregation: sum
  dimensions:
  - application
  - resolution
  - call_type
- name: moderation_volume
  description: AI moderation usage, drawn against moderation credits.
  unit: items
  aggregation: sum
  dimensions:
  - application
principles:
- name: Visibility
  description: Track Chat MAU and Video participant minutes per application and environment; separate dev from production.
- name: Allocation
  description: Split apps/environments per team or product so MAU and minutes map to cost centers.
- name: Optimization
  description: Reuse a single WebSocket connection per user session; right-size video resolution; prune inactive users to control MAU; use the Maker allowance while eligible.
- name: Accountability
  description: Assign owners per application; review monthly MAU and participant-minute trends against tier allowances before overage.
