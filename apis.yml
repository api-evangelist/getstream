aid: getstream
url: https://raw.githubusercontent.com/api-evangelist/getstream/refs/heads/main/apis.yml
name: Stream
kind: company
description: Stream (GetStream.io) provides scalable, API-first infrastructure for
  in-app chat messaging, activity feeds, audio/video calling and livestreaming, and
  AI moderation. The server-side platform is a documented REST API (base
  https://chat.stream-io-api.com for Chat) with JWT authentication, complemented by
  client SDKs that open a persistent WebSocket connection to receive real-time
  events - message.new, typing.start, user.presence.changed, reaction.new,
  notification.* and periodic health.check heartbeats. Products are metered on
  monthly active users (Chat) and participant minutes (Video), with Free/Maker,
  Standard (Startup) and Enterprise tiers.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Chat
- Messaging
- Activity Feeds
- Video
- Audio
- Moderation
- WebSocket
- Real Time
created: '2026-07-03'
modified: '2026-07-03'
specificationVersion: '0.19'
